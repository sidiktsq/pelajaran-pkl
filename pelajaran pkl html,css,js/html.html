<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>awal</title>
</head>
<body>
    <h1>hello world</h1>
    <p>ini adalah awal dari pkl di utb</p>

    <!-- list berturut/ordered list -->
    <ol>
        <li>ini list awal </li>
        <li>ini list dua </li>
        <li>ini list tiga</li>
    </ol>

    <!-- list tidak berturut/unordered list -->
    <ul>
        <li>ini list awal </li>
        <li>ini list dua </li>
        <li>ini list tiga</li>
    </ul>

    <!-- form input -->

     <form action="/submit" method="POST">  
    <label for="name">Nama:</label>  
    <input type="text" id="name" name="name" required><br>  
    <label for="email">Email:</label>  
    <input type="email" id="email" name="email" required><br> 
    <label for="password">password:</label> 
    <input type="password" id="password" name="password" required><br> 

    <input type="checkbox" id="agree" name="agree" value="yes">  
    <label for="agree">Saya setuju dengan syarat dan ketentuan</label><br>  

    <input type="radio" id="male" name="gender" value="male">  
    <label for="male">Laki-laki</label>  
    <input type="radio" id="female" name="gender" value="female">  
    <label for="female">Perempuan</label><br>  
</form>  

    <!-- button di dalam form -->
    <button type="button">kirim</button>

    <!-- tonbol standalone -->
     <button type="button" onclick="alert('hello')">klik saya</button>

     <!-- button hyperlink/tautan -->
     <a href="https://www.google.com">google</a>

      <!-- gambar -->
       <br>
       <img src="foto/alqe.png" alt="dekskripsi gambar" width="300" height="200">
</body> 
</html>
